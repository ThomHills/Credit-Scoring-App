<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body style="font-family: Arial; background:#f5f7fa;">

<div style="max-width:300px; margin:auto; margin-top:100px; padding:20px; background:white; border-radius:10px;">

    <h2 style="text-align:center;">Lender Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" name="password" placeholder="Password" required style="width:100%; padding:10px; margin-bottom:10px;">
        <button type="submit" style="width:100%; padding:10px; background:#007bff; color:white; border:none;">Login</button>
    </form>

</div>

</body>
</html>
