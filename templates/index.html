<!DOCTYPE html>
<html>
<body style="font-family:Arial; background:#f5f7fa;">

<div style="max-width:400px; margin:auto; margin-top:50px; background:white; padding:20px; border-radius:10px;">
    <h2>New Application</h2>

    <a href="/dashboard">Back</a><br><br>

    <form id="form">
        <input id="income" placeholder="Income"><br><br>
        <input id="expenses" placeholder="Expenses"><br><br>
        <input id="savings" placeholder="Savings"><br><br>
        <input id="missed" placeholder="Missed Payments"><br><br>
        <button type="submit">Submit</button>
    </form>

    <div id="msg"></div>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/score", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            income: income.value,
            expenses: expenses.value,
            savings: savings.value,
            missed_payments: missed.value
        })
    });

    const data = await res.json();

    if (data.error) {
        msg.innerText = data.error;
        return;
    }

    msg.innerText = "Score: " + data.score;

    setTimeout(() => window.location = "/dashboard", 1500);
};
</script>

</body>
</html>
