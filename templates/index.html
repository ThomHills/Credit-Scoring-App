<!DOCTYPE html>
<html>
<head>
    <title>Credit Score App</title>
</head>
<body>
    <h2>Check Your Credit Score</h2>

    <form id="scoreForm">
        <label>Monthly Income:</label><br>
        <input type="number" id="income"><br><br>

        <label>Monthly Expenses:</label><br>
        <input type="number" id="expenses"><br><br>

        <label>Savings:</label><br>
        <input type="number" id="savings"><br><br>

        <label>Missed Payments:</label><br>
        <input type="number" id="missed"><br><br>

        <button type="submit">Check Score</button>
    </form>

    <h3 id="result"></h3>

    <script>
        document.getElementById("scoreForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const data = {
                income: document.getElementById("income").value,
                expenses: document.getElementById("expenses").value,
                savings: document.getElementById("savings").value,
                missed_payments: document.getElementById("missed").value
            };

            const response = await fetch('/score', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            const result = await response.json();

            document.getElementById("result").innerText =
                "Score: " + result.score +
                " | Risk: " + result.risk +
                " | Default Prob: " + (result.probability_default * 100).toFixed(2) + "%";
        });
    </script>
</body>
</html>
