<script>
document.addEventListener("DOMContentLoaded", function() {

    document.getElementById("scoreForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        alert("Form submitted"); // DEBUG

        const data = {
            income: document.getElementById("income").value,
            expenses: document.getElementById("expenses").value,
            savings: document.getElementById("savings").value,
            missed_payments: document.getElementById("missed").value
        };

        try {
            const response = await fetch(window.location.origin + '/score', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            const result = await response.json();

            document.getElementById("result").innerText =
                "Score: " + result.score +
                " | Risk: " + result.risk;

        } catch (error) {
            console.error(error);
            alert("Error occurred");
        }
    });

});
</script>
