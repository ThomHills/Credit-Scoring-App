<!DOCTYPE html>
<html>
<head>
    <title>Credit Score App</title>
</head>

<body style="font-family: Arial; background-color:#f5f7fa;">

<div style="max-width: 400px; margin: auto; margin-top: 50px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);">

    <h2 style="text-align:center;">Credit Score Checker</h2>

    <form id="scoreForm">

        <label>Monthly Income</label>
        <input type="number" id="income" required style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">

        <label>Monthly Expenses</label>
        <input type="number" id="expenses" required style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">

        <label>Savings</label>
        <input type="number" id="savings" required style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;">

        <label>Missed Payments</label>
        <input type="number" id="missed" required style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:1px solid #ccc;">

        <button type="submit" style="width:100%; padding:12px; background:#007bff; color:white; border:none; border-radius:5px; font-size:16px;">
            Check Score
        </button>

    </form>

    <div id="resultCard" style="margin-top:20px; padding:15px; border-radius:8px; display:none;">
        <h3 id="scoreText"></h3>
        <p id="riskText"></p>
        <p id="probText"></p>
        <p id="explainText"></p>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const form = document.getElementById("scoreForm");

    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        const data = {
            income: document.getElementById("income").value,
            expenses: document.getElementById("expenses").value,
            savings: document.getElementById("savings").value,
            missed_payments: document.getElementById("missed").value
        };

        try {
            const response = await fetch("/score", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.error) {
                alert(result.error);
                return;
            }

            // Update UI
            document.getElementById("resultCard").style.display = "block";

            document.getElementById("scoreText").innerText =
                "Score: " + result.score;

            document.getElementById("riskText").innerText =
                "Risk Level: " + result.risk;

            document.getElementById("probText").innerText =
                "Default Probability: " + (result.probability_default * 100).toFixed(1) + "%";

            document.getElementById("explainText").innerText =
                "Reason: " + result.explanation.join(", ");

            // Color coding
            let color = "#28a745"; // green
            if (result.risk === "Medium") color = "#ffc107";
            if (result.risk === "High") color = "#dc3545";

            document.getElementById("resultCard").style.background = color;
            document.getElementById("resultCard").style.color = "white";

        } catch (error) {
            alert("Something went wrong");
        }
    });

});
</script>

</body>
</html>
