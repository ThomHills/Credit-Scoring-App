<!DOCTYPE html>
<html>
<body style="font-family:Arial; background:#f5f7fa;">

<div style="max-width:400px; margin:auto; margin-top:50px; background:white; padding:20px; border-radius:10px;">
    <h2>New Credit Application</h2>

    <a href="/dashboard">Back</a><br><br>

    <form id="form">

        <input id="duration" placeholder="Loan Duration (months)"><br><br>

        <input id="amount" placeholder="Credit Amount"><br><br>

        <input id="installment_rate" placeholder="Installment Rate (1-4)"><br><br>

        <input id="age" placeholder="Age"><br><br>

        <input id="existing_credits" placeholder="Existing Credits"><br><br>

        <button type="submit">Submit</button>
    </form>

    <div id="msg"></div>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/score", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            duration: duration.value,
            amount: amount.value,
            installment_rate: installment_rate.value,
            age: age.value,
            existing_credits: existing_credits.value
        })
    });

    const data = await res.json();

    if (data.error) {
        msg.innerText = data.error;
        return;
    }

    msg.innerText =
        "Score: " + data.score +
        " | Risk: " + data.risk +
        " | PD: " + data.prob_default;

    setTimeout(() => window.location = "/dashboard", 2000);
};
</script>

</body>
</html>
