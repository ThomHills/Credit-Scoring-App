<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>

<body style="font-family:Arial; background:#f5f7fa;">

<div style="max-width:1000px; margin:auto; margin-top:40px; background:white; padding:20px; border-radius:10px;">

    <h2>Dashboard</h2>

    <a href="/new">+ New Application</a>

    <br><br>

    <table border="1" cellpadding="8" style="border-collapse:collapse; width:100%; text-align:center;">
        <tr style="background:#eee;">
            <th>ID</th>
            <th>Duration</th>
            <th>Amount</th>
            <th>Installment</th>
            <th>Age</th>
            <th>Credits</th>
            <th>Score</th>
            <th>Risk</th>
            <th>Decision</th>
            <th>Action</th>
        </tr>

        {% for a in apps %}
        <tr>
            <td>{{ a.id }}</td>
            <td>{{ a.duration }}</td>
            <td>{{ a.amount }}</td>
            <td>{{ a.installment_rate }}</td>
            <td>{{ a.age }}</td>
            <td>{{ a.existing_credits }}</td>
            <td>{{ a.score }}</td>
            <td>{{ a.risk }}</td>
            <td>{{ a.decision }}</td>
            <td>
                <a href="/decide/{{ a.id }}/approve">Approve</a> |
                <a href="/decide/{{ a.id }}/reject">Reject</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
