<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:Arial; background:#f5f7fa; margin:0;">

<div style="max-width:1200px; margin:auto; padding:20px;">

<h2>Dashboard</h2>

<!-- TABS -->
<button onclick="showTab('overview')">Overview</button>
<button onclick="showTab('risk')">Risk</button>
<button onclick="showTab('model')">Model</button>
<button onclick="showTab('data')">Data</button>

<hr>

<!-- OVERVIEW -->
<div id="overview" class="tab">

<p>Total: {{ total }}</p>
<p>Avg Score: {{ avg_score }}</p>
<p>Approval Rate: {{ approval_rate }}%</p>
<p>Avg PD: {{ avg_pd }}</p>

<div style="height:300px"><canvas id="trendChart"></canvas></div>
<div style="height:300px"><canvas id="scoreDistChart"></canvas></div>

</div>

<!-- RISK -->
<div id="risk" class="tab" style="display:none">

<div style="height:300px"><canvas id="riskChart"></canvas></div>
<div style="height:300px"><canvas id="decisionChart"></canvas></div>
<div style="height:300px"><canvas id="riskDecisionChart"></canvas></div>

</div>

<!-- MODEL -->
<div id="model" class="tab" style="display:none">

<h3>AUC: {{ auc }}</h3>
<div style="height:400px"><canvas id="rocChart"></canvas></div>

</div>

<!-- DATA -->
<div id="data" class="tab" style="display:none">

<table border="1">
<tr><th>ID</th><th>Score</th><th>Risk</th><th>Decision</th></tr>

{% for a in apps %}
<tr>
<td>{{ a.id }}</td>
<td>{{ a.score }}</td>
<td>{{ a.risk }}</td>
<td>{{ a.decision }}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

<script>
// TAB SWITCH
function showTab(id){
    document.querySelectorAll(".tab").forEach(t => t.style.display="none");
    document.getElementById(id).style.display="block";
}

// SAFE DATA
const low = {{ low | default(0) }};
const medium = {{ medium | default(0) }};
const high = {{ high | default(0) }};

const approved = {{ approved | default(0) }};
const rejected = {{ rejected | default(0) }};

const scoreBins = {{ score_bins | tojson }};
const riskData = {{ risk_approval | tojson }};
const trend = {{ (recent_scores or []) | tojson }};
const fpr = {{ (fpr or []) | tojson }};
const tpr = {{ (tpr or []) | tojson }};

// SAFE STRUCTURE
const safeRisk = {
    Low: riskData.Low || {Approved:0,Rejected:0},
    Medium: riskData.Medium || {Approved:0,Rejected:0},
    High: riskData.High || {Approved:0,Rejected:0}
};

const options = { responsive:true, maintainAspectRatio:false };

// CHARTS
new Chart(document.getElementById('riskChart'), {
    type:'bar',
    data:{ labels:['Low','Medium','High'],
    datasets:[{label:'Risk',data:[low,medium,high]}]},
    options
});

new Chart(document.getElementById('decisionChart'), {
    type:'pie',
    data:{ labels:['Approved','Rejected'],
    datasets:[{data:[approved,rejected]}]},
    options
});

new Chart(document.getElementById('scoreDistChart'), {
    type:'bar',
    data:{ labels:Object.keys(scoreBins),
    datasets:[{label:'Scores',data:Object.values(scoreBins)}]},
    options
});

new Chart(document.getElementById('riskDecisionChart'), {
    type:'bar',
    data:{
        labels:['Low','Medium','High'],
        datasets:[
            {label:'Approved',data:[
                safeRisk.Low.Approved,
                safeRisk.Medium.Approved,
                safeRisk.High.Approved
            ]},
            {label:'Rejected',data:[
                safeRisk.Low.Rejected,
                safeRisk.Medium.Rejected,
                safeRisk.High.Rejected
            ]}
        ]
    },
    options
});

if(trend.length){
new Chart(document.getElementById('trendChart'), {
    type:'line',
    data:{ labels:trend.map((_,i)=>i+1),
    datasets:[{label:'Trend',data:trend}]},
    options
});
}

if(fpr.length){
new Chart(document.getElementById('rocChart'), {
    type:'line',
    data:{ labels:fpr,
    datasets:[{label:'ROC',data:tpr}]},
    options
});
}
</script>

</body>
</html>
