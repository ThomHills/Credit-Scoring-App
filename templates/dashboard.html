<!DOCTYPE html>
<html>
<body style="font-family:Arial; background:#f5f7fa;">

<div style="max-width:900px; margin:auto; margin-top:40px;">

<h2>Dashboard</h2>

<a href="/">+ New</a>
<a href="/logout" style="float:right;">Logout</a>

<br><br>

<table border="1" width="100%" style="background:white; text-align:center;">
<tr>
<th>Income</th>
<th>Expenses</th>
<th>Savings</th>
<th>Missed</th>
<th>Score</th>
<th>Risk</th>
<th>Decision</th>
<th>Action</th>
</tr>

{% for app in apps %}
<tr>
<td>{{ app.income }}</td>
<td>{{ app.expenses }}</td>
<td>{{ app.savings }}</td>
<td>{{ app.missed }}</td>
<td>{{ app.score }}</td>
<td>{{ app.risk }}</td>
<td>{{ app.decision }}</td>
<td>
<a href="/decide/{{ app.id }}/approve">Approve</a> |
<a href="/decide/{{ app.id }}/reject">Reject</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
